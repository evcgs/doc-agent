version: '3.8'

services:
  calendaragent:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: calendaragent
    restart: unless-stopped
    environment:
      - OPENCLAW_WORKSPACE=/app/workspace
      - NODE_ENV=production
    volumes:
      - ./workspace:/app/workspace
      - calendaragent-data:/app/data
    ports:
      - "9999:9999"
    networks:
      - openclaw-network
    healthcheck:
      test: ["CMD", "openclaw", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  calendaragent-data:
    name: calendaragent-data

networks:
  openclaw-network:
    name: openclaw-network
    driver: bridge
